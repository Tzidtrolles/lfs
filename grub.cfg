	linux /vmlinuz-6.18.10-lfs-13.0-systemd root=/dev/nvme0n1p1
}
submenu 'Advanced options for Linux (on /dev/nvme0n1p1)' $menuentry_id_option 'osprober-gnulinux-advanced-94fa2faf-0d17-44aa-a54f-5f9a5cf1ff00' {
	menuentry 'Linux (on /dev/nvme0n1p1)' --class gnu-linux --class gnu --class os $menuentry_id_option 'osprober-gnulinux-/vmlinuz-6.18.10-lfs-13.0-systemd--94fa2faf-0d17-44aa-a54f-5f9a5cf1ff00' {
	
		linux /vmlinuz-6.18.10-lfs-13.0-systemd root=/dev/nvme0n1p1
	}
}

### END /etc/grub.d/30_os-prober ###

### BEGIN /etc/grub.d/30_uefi-firmware ###
if [ "$grub_platform" = "efi" ]; then
	fwsetup --is-supported
	if [ "$?" = 0 ]; then
		menuentry 'UEFI Firmware Settings' $menuentry_id_option 'uefi-firmware' {
			fwsetup
		}
	fi
fi
### END /etc/grub.d/30_uefi-firmware ###

